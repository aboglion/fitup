<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="אפליקציית אימונים חכמה - תוכנית אימוני משקל גוף עם מערכת התקדמות אוטומטית כמו משחק">
    <meta name="theme-color" content="#0f0f23">
    <title>FitPro - אימון חכם</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Splash -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">💪</div>
            <h1 class="splash-title">FitPro</h1>
            <p class="splash-subtitle">אימון חכם</p>
            <div class="splash-loader"><div class="splash-loader-bar"></div></div>
        </div>
    </div>

    <div id="app" class="app hidden">
        <!-- Nav -->
        <nav id="top-nav" class="top-nav">
            <div class="nav-right">
                <button id="btn-back" class="nav-btn hidden" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <h1 id="nav-title" class="nav-title">FitPro</h1>
            </div>
            
            <div class="nav-sync-wrapper" id="nav-sync-wrapper">
                <div id="sync-status-indicator" class="sync-status-indicator" onclick="toggleSyncDropdown(event)"></div>
                <div id="sync-dropdown" class="sync-dropdown hidden" onclick="event.stopPropagation()"></div>
            </div>
            
            <div class="nav-left">
                <button id="btn-leaderboard" class="nav-btn leaderboard-btn" onclick="showLeaderboard()" title="טבלת תחרות">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/>
                        <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
                        <path d="M12 2a6 6 0 0 1 6 6v5a6 6 0 0 1-6 6 6 6 0 0 1-6-6V8a6 6 0 0 1 6-6z"/>
                    </svg>
                </button>
                <button id="btn-admin" class="nav-btn admin-btn" onclick="showAdminPanel()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
            </div>
        </nav>

        <!-- Home Screen: Smart Today View -->
        <section id="screen-home" class="screen active">
            <div class="home-header">
                <div class="home-greeting">
                    <h2 id="greeting-text"></h2>
                    <p class="home-date" id="current-date"></p>
                </div>
                <div id="xp-bar-container" class="xp-bar-container"></div>
                <div id="ai-motivation" class="ai-motivation-card hidden"></div>
            </div>
            
            <!-- Today's Smart Card -->
            <div id="today-card" class="today-card"></div>
            
            <!-- Weekly Progress -->
            <div id="weekly-progress" class="weekly-progress"></div>
            
            <!-- Stats Overview -->
            <div id="stats-overview" class="stats-overview"></div>
        </section>

        <!-- Day View: Show exercises at current level -->
        <section id="screen-day" class="screen">
            <div class="day-header" id="day-header">
                <div class="day-emoji" id="day-emoji"></div>
                <h2 id="day-title"></h2>
                <p id="day-subtitle"></p>
                <div id="day-progress-bar" class="day-progress-bar"></div>
                <button class="start-workout-btn" id="start-workout-btn" onclick="startWorkout()">▶ התחל אימון</button>
            </div>
            <div class="muscles-list" id="muscles-list"></div>
        </section>

        <!-- Active Workout: Professional Set Tracking -->
        <section id="screen-workout" class="screen">
            <div id="workout-content"></div>
        </section>

        <!-- Workout Summary -->
        <section id="screen-summary" class="screen">
            <div id="summary-content"></div>
        </section>

        <!-- Exercise Detail (kept for viewing) -->
        <section id="screen-exercise" class="screen">
            <div class="exercise-detail" id="exercise-detail"></div>
        </section>

        <!-- Admin -->
        <section id="screen-admin" class="screen">
            <div class="admin-panel" id="admin-panel">
                <div class="admin-header"><h2>⚙️ ניהול מערכת</h2></div>
                <div class="admin-tabs">
                    <button class="admin-tab active" data-tab="days" onclick="switchAdminTab('days')">ימים</button>
                    <button class="admin-tab" data-tab="muscles" onclick="switchAdminTab('muscles')">שרירים</button>
                    <button class="admin-tab" data-tab="exercises" onclick="switchAdminTab('exercises')">תרגילים</button>
                    <button class="admin-tab" data-tab="history" onclick="switchAdminTab('history')">היסטוריה</button>
                    <button class="admin-tab" data-tab="cloud" onclick="switchAdminTab('cloud')">ענן</button>
                    <button class="admin-tab" data-tab="settings" onclick="switchAdminTab('settings')">הגדרות</button>
                </div>
                <div class="admin-content" id="admin-content"></div>
            </div>
        </section>

        <!-- Leaderboard -->
        <section id="screen-leaderboard" class="screen">
            <div class="leaderboard-panel">
                <div class="leaderboard-header">
                    <h2>🏆 טבלת מובילים ותחרות</h2>
                    <p class="leaderboard-subtitle">התחרו עם מתאמנים אחרים והגיעו לפסגה!</p>
                </div>
                
                <!-- Opt-in / Configuration Card -->
                <div class="leaderboard-optin-card card" id="leaderboard-optin-card">
                    <div class="optin-status-row">
                        <span class="optin-label">שתף את ה-XP שלי בתחרות הציבורית:</span>
                        <label class="switch">
                            <input type="checkbox" id="leaderboard-optin-toggle" onchange="toggleLeaderboardOptIn()">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="optin-name-row hidden" id="optin-name-row">
                        <label for="leaderboard-display-name">שם תצוגה בתחרות:</label>
                        <div class="name-input-group">
                            <input type="text" id="leaderboard-display-name" class="admin-input" placeholder="שם תצוגה...">
                            <button class="admin-btn-sm" onclick="saveLeaderboardName()">עדכן שם</button>
                        </div>
                    </div>
                </div>

                <div class="leaderboard-my-rank-card card hidden" id="leaderboard-my-rank-card">
                    <!-- Dynamic personal stats -->
                </div>
                
                <div class="leaderboard-actions">
                    <button class="admin-btn-sm" id="btn-refresh-leaderboard" onclick="syncLeaderboard(true)">🔄 רענן טבלה</button>
                </div>
                
                <div class="leaderboard-content" id="leaderboard-content">
                    <div class="leaderboard-loading">
                        <div class="spinner"></div>
                        <p>טוען טבלת מובילים...</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="video-modal hidden" onclick="closeVideoModal()">
        <div class="video-modal-content" onclick="event.stopPropagation()">
            <button class="video-close" onclick="closeVideoModal()">✕</button>
            <div id="video-container" class="video-container"></div>
        </div>
    </div>

    <!-- Rest Timer Overlay -->
    <div id="rest-timer-overlay" class="rest-timer-overlay hidden">
        <div class="rest-timer-content">
            <div class="rest-timer-circle" id="rest-timer-circle">
                <svg viewBox="0 0 120 120">
                    <circle class="rest-timer-bg" cx="60" cy="60" r="54"/>
                    <circle class="rest-timer-progress" id="rest-timer-progress" cx="60" cy="60" r="54"/>
                </svg>
                <span class="rest-timer-text" id="rest-timer-text">0:00</span>
            </div>
            <p class="rest-timer-label">מנוחה</p>
            <div id="rest-timer-motivation" class="rest-timer-motivation"></div>
            <button class="rest-timer-skip" onclick="skipRestTimer()">דלג ▶</button>
        </div>
    </div>

    <!-- Level Up Animation -->
    <div id="levelup-overlay" class="levelup-overlay hidden">
        <div class="levelup-content">
            <div class="levelup-stars">⭐</div>
            <h2 class="levelup-title" id="levelup-title">עלית רמה!</h2>
            <p class="levelup-detail" id="levelup-detail"></p>
            <div class="levelup-badge" id="levelup-badge"></div>
            <button class="levelup-btn" onclick="closeLevelUp()">🔥 המשך</button>
        </div>
    </div>

    <div id="toast" class="toast hidden"><span id="toast-message"></span></div>

    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="auth.js"></script>
    <script src="ai.js"></script>
    <script src="app.js"></script>
</body>
</html>
